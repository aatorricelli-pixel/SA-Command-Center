name: Live Incident Ingestion

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

           - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run ingestion once
        run: npm run once
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ESKOMSEPUSH_API_KEY: ${{ secrets.ESKOMSEPUSH_API_KEY }}
          TRAFFIC_ALERTS_URL: ${{ vars.TRAFFIC_ALERTS_URL }}
          CITY_POWER_STATUS_URL: ${{ vars.CITY_POWER_STATUS_URL }}
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
          ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
          ACLED_ACCESS_TOKEN: ${{ secrets.ACLED_ACCESS_TOKEN }}
